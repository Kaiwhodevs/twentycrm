{{- if .Values.localStorage.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "twentycrm.fullname" . }}-local-data
  namespace: {{ include "twentycrm.namespace" . }}
  labels:
    {{- include "twentycrm.labels" . | nindent 4 }}
    app.kubernetes.io/component: local-data
  annotations:
    helm.sh/resource-policy: keep
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.localStorage.persistence.accessModes | nindent 4 }}
  {{- include "twentycrm.storageClass" (dict "value" .Values.localStorage.persistence.storageClass "global" .Values.global) | nindent 2 }}
  resources:
    requests:
      storage: {{ .Values.localStorage.persistence.size }}
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "twentycrm.serverName" . }}
  namespace: {{ include "twentycrm.namespace" . }}
  labels:
    {{- include "twentycrm.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- $annotations := merge (deepCopy .Values.server.service.annotations) .Values.commonAnnotations }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "twentycrm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server

name: Publish Artifact Hub metadata

# Publishes artifacthub-repo.yml to GHCR as the special `artifacthub.io` OCI
# artifact. Artifact Hub reads it to enable the "Verified Publisher" badge
# (it matches the repositoryID in the file against the repository you added).
#
# Runs when artifacthub-repo.yml changes, or on manual dispatch.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - artifacthub-repo.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push Artifact Hub repository metadata
        run: |
          set -euo pipefail
          oras push \
            ghcr.io/kaiwhodevs/twentycrm-chart:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
          echo "Published artifacthub-repo.yml to ghcr.io/kaiwhodevs/twentycrm-chart:artifacthub.io"

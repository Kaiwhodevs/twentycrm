# Artifact Hub repository metadata.
# Published to GHCR as oci://ghcr.io/kaiwhodevs/twentycrm:artifacthub.io
# by .github/workflows/publish-artifacthub-metadata.yml.
#
# repositoryID enables the "Verified Publisher" badge: Artifact Hub matches this
# against the repository you registered (Control Panel -> Repositories -> ID).
repositoryID: c35bcc34-b770-4459-a979-1af78ac95c1f

# Optional: claim repository ownership. The email must match the one on your
# Artifact Hub account.
owners:
  - name: Kaiwhodevs
    email: kai@cod3labs.com

# Exclude versions from the Artifact Hub index. v2.8.0 referenced a Twenty image
# tag that was never published to Docker Hub, so it is intentionally dropped.
# (version is a regex; matches the stored version with or without the leading v.)
ignore:
  - name: twentycrm
    version: '^v?2\.8\.0$'
